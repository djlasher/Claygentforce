<template>
  <lightning-card
    title="Claygentforce Scenario Launcher"
    icon-name="standard:work_plan"
  >
    <div class="delivery-room slds-p-horizontal_medium slds-p-bottom_medium">
      <section class="hero-panel" aria-labelledby="product-orientation-heading">
        <div class="hero-content">
          <p class="eyebrow">Salesforce consulting judgment simulator</p>
          <h2 id="product-orientation-heading" class="hero-heading">
            Claygentforce War Room
          </h2>
          <p class="hero-copy">
            A multi-perspective delivery-room simulation for practicing the
            judgment calls Salesforce consultants make under real project
            pressure.
          </p>
          <p class="hero-summary">{productSummary}</p>
        </div>

        <div class="hero-side">
          <div class="mode-strip" aria-label="Current mode highlights">
            <template for:each={modeHighlights} for:item="highlight">
              <div key={highlight.label} class="mode-pill">
                <span>{highlight.label}</span>
                <strong>{highlight.value}</strong>
              </div>
            </template>
          </div>
          <ol class="principle-list" aria-label="Guiding principles">
            <template for:each={guidingPrinciples} for:item="principle">
              <li key={principle}>{principle}</li>
            </template>
          </ol>
        </div>
      </section>

      <section class="demo-chat-panel" aria-labelledby="demo-chat-heading">
        <div class="section-header section-header-row">
          <div>
            <p class="eyebrow">Consulting simulation</p>
            <h3 id="demo-chat-heading" class="section-heading">
              Salesforce Delivery War Room
            </h3>
            <p class="section-subtitle">
              Choose a professional perspective, make bounded delivery
              decisions, and watch the room react.
            </p>
          </div>
          <template if:true={hasDemoStarted}>
            <button
              class="reset-run-button"
              type="button"
              onclick={handleDemoReset}
            >
              Restart chat
            </button>
          </template>
        </div>

        <dl class="demo-metadata-strip" aria-label="War Room metadata">
          <template for:each={warRoomMetadata} for:item="item">
            <div key={item.label} class="demo-metadata-item">
              <dt>{item.label}</dt>
              <dd>{item.value}</dd>
            </div>
          </template>
        </dl>

        <div class="demo-role-groups" aria-label="Select learner role">
          <template for:each={demoRoleGroups} for:item="group">
            <section key={group.id} class="demo-role-group">
              <button
                class="demo-role-group-toggle"
                type="button"
                data-group-id={group.id}
                aria-expanded={group.ariaExpanded}
                onclick={handleDemoRoleGroupToggle}
              >
                <span>{group.title}</span>
                <span>{group.toggleLabel}</span>
              </button>

              <template if:true={group.isExpanded}>
                <div class="demo-role-grid">
                  <template for:each={group.roles} for:item="role">
                    <button
                      key={role.id}
                      class={role.cssClass}
                      type="button"
                      data-role-id={role.id}
                      aria-pressed={role.ariaPressed}
                      disabled={role.disabled}
                      onclick={handleDemoRoleSelect}
                    >
                      <span class="demo-role-title">{role.title}</span>
                      <span class="demo-role-description">
                        {role.description}
                      </span>
                      <span class="demo-role-status">{role.status}</span>
                    </button>
                  </template>
                </div>
              </template>
            </section>
          </template>
        </div>

        <div
          class="demo-chat-window"
          aria-label="Salesforce delivery war room transcript"
        >
          <template if:false={hasDemoTranscript}>
            <p class="demo-empty-state">
              Select Technical Architect or QA Lead to enter the War Room.
            </p>
          </template>

          <template for:each={demoTranscript} for:item="message">
            <article
              key={message.key}
              class={message.cssClass}
              data-type={message.type}
            >
              <div class="demo-chat-avatar" aria-hidden="true">
                {message.initials}
              </div>
              <div class="demo-chat-bubble">
                <div class="demo-chat-meta">
                  <strong>{message.displayName}</strong>
                  <span>{message.roleTitle}</span>
                  <template if:true={message.hasReaction}>
                    <span class={message.reactionCssClass}>
                      {message.reactionLabel}
                    </span>
                  </template>
                </div>
                <p>{message.text}</p>
              </div>
            </article>
          </template>

          <template if:true={isDemoTyping}>
            <div class="demo-typing-indicator" aria-live="polite">
              <span></span>
              <span></span>
              <span></span>
            </div>
          </template>

          <template if:true={hasDemoPrompt}>
            <div class="demo-prompt-panel">
              <p class="demo-prompt-title">{demoPrompt.title}</p>
              <template if:true={isDemoChoicePrompt}>
                <div
                  class="choice-preview"
                  aria-label="War Room learner choices"
                >
                  <template for:each={demoPrompt.choices} for:item="choice">
                    <button
                      key={choice.id}
                      class={choice.cssClass}
                      type="button"
                      data-choice-id={choice.id}
                      aria-pressed={choice.ariaPressed}
                      onclick={handleDemoChoiceSelect}
                    >
                      {choice.label}
                    </button>
                  </template>
                </div>
              </template>
              <template if:true={isDemoFollowUpPrompt}>
                <div
                  class="follow-up-action-list"
                  aria-label="Follow-up actions"
                >
                  <template for:each={demoPrompt.actions} for:item="action">
                    <button
                      key={action.id}
                      class={action.cssClass}
                      type="button"
                      data-action-id={action.id}
                      aria-pressed={action.ariaPressed}
                      onclick={handleDemoFollowUpActionSelect}
                    >
                      {action.label}
                    </button>
                  </template>
                </div>
              </template>
              <template if:true={isDemoChallengePrompt}>
                <div
                  class="challenge-response-actions"
                  aria-label="Challenge response choices"
                >
                  <template for:each={demoPrompt.responses} for:item="response">
                    <button
                      key={response.id}
                      class={response.cssClass}
                      type="button"
                      data-response-id={response.id}
                      aria-pressed={response.ariaPressed}
                      onclick={handleDemoChallengeResponseSelect}
                    >
                      {response.label}
                    </button>
                  </template>
                </div>
              </template>
            </div>
          </template>
        </div>

        <template if:true={hasDemoScore}>
          <section
            class="demo-score-panel"
            aria-labelledby="demo-score-heading"
          >
            <div>
              <p class="eyebrow">War Room Assessment</p>
              <h4 id="demo-score-heading" class="demo-score-heading">
                {demoScore.confidenceLabel}: {demoScore.confidencePercent}%
              </h4>
              <p class="demo-score-subtitle">
                Numeric score retained: {demoScore.total}/100
              </p>
            </div>
            <dl class="demo-executive-grid">
              <template
                for:each={demoScore.executiveIndicators}
                for:item="indicator"
              >
                <div key={indicator.label} class="demo-executive-item">
                  <dt>{indicator.label}</dt>
                  <dd>{indicator.value}</dd>
                </div>
              </template>
            </dl>
            <dl class="demo-score-grid">
              <template for:each={demoScore.dimensions} for:item="dimension">
                <div key={dimension.label} class="demo-score-item">
                  <dt>{dimension.label}</dt>
                  <dd>{dimension.points}/25</dd>
                </div>
              </template>
            </dl>
            <div class="demo-sentiment-section">
              <p class="demo-score-section-title">Team Sentiment</p>
              <dl class="demo-sentiment-list">
                <template for:each={demoScore.sentiment} for:item="sentiment">
                  <div key={sentiment.key} class="demo-sentiment-item">
                    <dt>
                      <span>{sentiment.name}</span>
                      <small>{sentiment.person}</small>
                    </dt>
                    <dd>
                      <span class={sentiment.cssClass}>{sentiment.state}</span>
                    </dd>
                  </div>
                </template>
              </dl>
            </div>
            <div class="demo-score-notes">
              <section class="demo-score-note-block">
                <h5>Strengths</h5>
                <p>{demoScore.strength}</p>
              </section>
              <section class="demo-score-note-block">
                <h5>Risk Areas</h5>
                <p>{demoScore.evidenceGap}</p>
              </section>
              <section class="demo-score-note-block">
                <h5>Recommended Next Action</h5>
                <p>{demoScore.nextAction}</p>
              </section>
            </div>
          </section>
        </template>
      </section>
    </div>
  </lightning-card>
</template>
