<template>
  <lightning-card
    title="Claygentforce Scenario Launcher"
    icon-name="standard:work_plan"
  >
    <div class="delivery-room slds-p-horizontal_medium slds-p-bottom_medium">
      <section class="hero-panel" aria-labelledby="product-orientation-heading">
        <div class="hero-content">
          <p class="eyebrow">Static Salesforce delivery simulator</p>
          <h2 id="product-orientation-heading" class="hero-heading">
            Claygentforce Delivery Room
          </h2>
          <p class="hero-copy">
            A compact delivery-team simulation surface for practicing Salesforce
            implementation judgment with real metadata and static role-based
            context.
          </p>
          <p class="hero-summary">{productSummary}</p>
        </div>

        <div class="hero-side">
          <div class="mode-strip" aria-label="Current mode highlights">
            <template for:each={modeHighlights} for:item="highlight">
              <div key={highlight.label} class="mode-pill">
                <span>{highlight.label}</span>
                <strong>{highlight.value}</strong>
              </div>
            </template>
          </div>
          <ol class="principle-list" aria-label="Guiding principles">
            <template for:each={guidingPrinciples} for:item="principle">
              <li key={principle}>{principle}</li>
            </template>
          </ol>
        </div>
      </section>

      <section
        class="chat-preview-panel"
        aria-labelledby="chat-preview-heading"
      >
        <div class="section-header section-header-row">
          <div>
            <p class="eyebrow">Bounded simulation</p>
            <h3 id="chat-preview-heading" class="section-heading">
              Scenario 001 Delivery Room
            </h3>
            <p class="section-subtitle">{sectionSubtitles.chatPreview}</p>
          </div>
          <div class="simulation-header-actions">
            <span class="section-badge">Local Simulation</span>
            <template if:true={hasStartedRun}>
              <button
                class="reset-run-button"
                type="button"
                onclick={handleResetPreview}
              >
                Reset run
              </button>
            </template>
          </div>
        </div>

        <div class="session-shell" aria-label="Current simulation session">
          <dl class="session-summary">
            <template for:each={simulationSessionSummary} for:item="item">
              <div key={item.label} class="session-summary-item">
                <dt>{item.label}</dt>
                <dd>{item.value}</dd>
              </div>
            </template>
          </dl>

          <ol class="phase-strip" aria-label="Simulation progress">
            <template for:each={simulationPhases} for:item="phase">
              <li
                key={phase.id}
                class={phase.cssClass}
                aria-current={phase.ariaCurrent}
              >
                {phase.label}
              </li>
            </template>
          </ol>
        </div>

        <section
          class="scenario-moment-panel"
          aria-labelledby="scenario-moment-heading"
        >
          <div class="scenario-moment-header">
            <div class="chat-avatar" aria-hidden="true">
              {scenarioMoment.speaker}
            </div>
            <div>
              <p class="eyebrow">{scenarioMoment.role}</p>
              <h4 id="scenario-moment-heading" class="scenario-moment-heading">
                {scenarioMoment.title}
              </h4>
            </div>
          </div>
          <div class="scenario-moment-copy">
            <p>{scenarioMoment.situation}</p>
            <p><strong>Pressure:</strong> {scenarioMoment.pressure}</p>
            <p><strong>What is at risk:</strong> {scenarioMoment.stakes}</p>
          </div>
          <ul class="scenario-moment-list">
            <template for:each={scenarioMomentContextBullets} for:item="item">
              <li key={item}>{item}</li>
            </template>
          </ul>
          <p class="scenario-moment-prompt">{scenarioMoment.learnerPrompt}</p>
        </section>

        <div
          class="chat-window"
          aria-label="Static delivery room conversation preview"
        >
          <template for:each={chatPreviewMessages} for:item="message">
            <article
              key={message.key}
              class="chat-message"
              data-type={message.type}
            >
              <div class="chat-avatar" aria-hidden="true">
                {message.speaker}
              </div>
              <div class="chat-bubble">
                <div class="chat-meta">
                  <span class="chat-role">{message.role}</span>
                  <span class="chat-label">Local static simulation</span>
                </div>
                <p>{message.text}</p>
                <template if:true={message.choices}>
                  <div
                    class="choice-preview"
                    aria-label="Bounded learner choices"
                  >
                    <template for:each={message.choices} for:item="choice">
                      <button
                        key={choice.id}
                        class={choice.cssClass}
                        type="button"
                        data-choice-id={choice.id}
                        aria-pressed={choice.ariaPressed}
                        onclick={handleChoiceSelect}
                      >
                        {choice.label}
                      </button>
                    </template>
                  </div>
                </template>
              </div>
            </article>
          </template>
          <template for:each={selectedChatMessages} for:item="selectedMessage">
            <article
              key={selectedMessage.key}
              class={selectedMessage.cssClass}
              data-type={selectedMessage.type}
            >
              <div class="chat-avatar" aria-hidden="true">
                {selectedMessage.speaker}
              </div>
              <div class="chat-bubble">
                <div class="chat-meta">
                  <span class="chat-role">{selectedMessage.role}</span>
                  <span class="chat-label">{selectedMessage.label}</span>
                </div>
                <p>{selectedMessage.text}</p>
                <template if:true={selectedMessage.learningNote}>
                  <p class="learning-note">{selectedMessage.learningNote}</p>
                </template>
                <template if:true={selectedMessage.followUpActions}>
                  <div
                    class="follow-up-action-list"
                    aria-label="Bounded follow-up actions"
                  >
                    <template
                      for:each={selectedMessage.followUpActions}
                      for:item="action"
                    >
                      <button
                        key={action.id}
                        class={action.cssClass}
                        type="button"
                        data-action-id={action.id}
                        aria-pressed={action.ariaPressed}
                        onclick={handleFollowUpActionSelect}
                      >
                        {action.label}
                      </button>
                    </template>
                  </div>
                </template>
                <template if:true={selectedMessage.challengeResponses}>
                  <div
                    class="challenge-response-actions"
                    aria-label="Bounded challenge response choices"
                  >
                    <template
                      for:each={selectedMessage.challengeResponses}
                      for:item="response"
                    >
                      <button
                        key={response.id}
                        class={response.cssClass}
                        type="button"
                        data-response-id={response.id}
                        aria-pressed={response.ariaPressed}
                        onclick={handleChallengeResponseSelect}
                      >
                        {response.label}
                      </button>
                    </template>
                  </div>
                </template>
              </div>
            </article>
          </template>
        </div>

        <template if:true={hasSelectedEvidenceBeforeCompletion}>
          <section
            class="evidence-panel"
            aria-labelledby="evidence-panel-heading"
          >
            <div class="evidence-header">
              <div>
                <p class="eyebrow">Recommended validation evidence</p>
                <h4 id="evidence-panel-heading" class="evidence-heading">
                  {selectedChoiceLabel}
                </h4>
              </div>
            </div>

            <dl class="evidence-grid">
              <div>
                <dt>Recommended evidence</dt>
                <dd>{selectedEvidence.recommendedEvidence}</dd>
              </div>
              <div>
                <dt>Why it matters</dt>
                <dd>{selectedEvidence.whyItMatters}</dd>
              </div>
              <div>
                <dt>What not to claim yet</dt>
                <dd>{selectedEvidence.whatNotToClaimYet}</dd>
              </div>
            </dl>
          </section>
        </template>

        <template if:true={hasSessionResult}>
          <section
            class="session-result-panel"
            aria-labelledby="session-result-heading"
          >
            <div class="session-result-section">
              <p class="eyebrow">Decision path</p>
              <h4 id="session-result-heading" class="session-result-heading">
                Session Result
              </h4>
              <dl class="decision-path-summary">
                <template for:each={sessionResultRows} for:item="row">
                  <div key={row.label} class="session-result-item">
                    <dt>{row.label}</dt>
                    <dd>{row.value}</dd>
                  </div>
                </template>
              </dl>
            </div>

            <div class="outcome-summary-section">
              <p class="eyebrow">Outcome summary</p>
              <h4 class="session-result-heading">{selectedOutcome.label}</h4>
              <div class="outcome-summary-copy">
                <p>{selectedOutcome.summary}</p>
                <p>
                  <strong>Consequence:</strong> {selectedOutcome.consequence}
                </p>
                <p>
                  <strong>Recommended next step:</strong>
                  <span>{selectedOutcome.recommendedNextStep}</span>
                </p>
              </div>
            </div>

            <template if:true={hasSelectedTeamReview}>
              <div
                class="team-review-section"
                aria-labelledby="team-review-heading"
              >
                <p class="eyebrow">Delivery feedback</p>
                <h4 id="team-review-heading" class="session-result-heading">
                  Team Review
                </h4>
                <div class="team-review-card">
                  <p class="team-review-role">{selectedTeamReview.role}</p>
                  <p>{selectedTeamReview.summary}</p>
                  <p>
                    <strong>Strength:</strong>
                    <span>{selectedTeamReview.strength}</span>
                  </p>
                  <p>
                    <strong>Watch out:</strong>
                    <span>{selectedTeamReview.watchOut}</span>
                  </p>
                </div>
              </div>
            </template>

            <template if:true={hasSelectedRolePushback}>
              <div
                class="team-challenge-section"
                aria-labelledby="team-challenge-heading"
              >
                <p class="eyebrow">Delivery challenge</p>
                <h4 id="team-challenge-heading" class="session-result-heading">
                  Team Challenge
                </h4>
                <div class="team-challenge-card">
                  <div class="team-challenge-role">
                    <span class="chat-avatar" aria-hidden="true">
                      {selectedRolePushback.speaker}
                    </span>
                    <strong>{selectedRolePushback.role}</strong>
                  </div>
                  <p>
                    <strong>Challenge:</strong>
                    <span>{selectedRolePushback.challenge}</span>
                  </p>
                  <p>
                    <strong>Risk if ignored:</strong>
                    <span>{selectedRolePushback.riskIfIgnored}</span>
                  </p>
                  <p>
                    <strong>Suggested response:</strong>
                    <span>{selectedRolePushback.suggestedResponse}</span>
                  </p>
                </div>
              </div>
            </template>

            <template if:true={hasSelectedCloseoutNote}>
              <div
                class="closeout-note-section"
                aria-labelledby="closeout-note-heading"
              >
                <p class="eyebrow">Run closeout</p>
                <h4 id="closeout-note-heading" class="session-result-heading">
                  Closeout Note
                </h4>
                <div class="closeout-note-card">
                  <p>{selectedCloseoutNote.summary}</p>
                  <p>
                    <strong>Next step:</strong>
                    <span>{selectedCloseoutNote.nextStep}</span>
                  </p>
                </div>
              </div>
            </template>

            <template if:true={hasSelectedValidationChecklist}>
              <div
                class="manual-validation-section"
                aria-labelledby="manual-validation-heading"
              >
                <p class="eyebrow">Validation next steps</p>
                <h4
                  id="manual-validation-heading"
                  class="session-result-heading"
                >
                  Manual Validation Checklist
                </h4>
                <ol class="manual-validation-list">
                  <template
                    for:each={selectedValidationChecklist}
                    for:item="item"
                  >
                    <li key={item}>{item}</li>
                  </template>
                </ol>
              </div>
            </template>
          </section>
        </template>

        <p class="chat-preview-note">{sectionSubtitles.chatPreviewNote}</p>
      </section>

      <section
        class="supporting-context-panel"
        aria-labelledby="supporting-context-heading"
      >
        <div class="supporting-context-header">
          <div>
            <p class="eyebrow">Supporting context</p>
            <h3 id="supporting-context-heading" class="section-heading">
              Dashboard Reference
            </h3>
          </div>
          <button
            class="supporting-context-toggle"
            type="button"
            aria-expanded={supportingContextAriaExpanded}
            aria-controls="supporting-context-content"
            onclick={handleSupportingContextToggle}
          >
            {supportingContextToggleLabel}
          </button>
        </div>

        <template if:false={isSupportingContextExpanded}>
          <p class="supporting-context-summary">{supportingContextSummary}</p>
        </template>

        <template if:true={isSupportingContextExpanded}>
          <div
            id="supporting-context-content"
            class="supporting-reference"
            aria-label="Supporting reference context"
          >
            <section class="reference-card" aria-labelledby="reference-heading">
              <p class="eyebrow">Reference only</p>
              <h4 id="reference-heading" class="reference-heading">
                Scenario 001 MVP boundaries
              </h4>
              <p class="reference-copy">
                This is a static local Scenario 001 delivery simulation. The
                chat-first run above is the primary surface for learner
                decisions, role pushback, review notes, and closeout feedback.
              </p>
              <ul class="reference-list">
                <li>
                  Current mode constraints are intentional: no Apex, no
                  persistence, no external AI calls, no Agentforce integration,
                  no freeform chat input, and no runtime orchestration.
                </li>
                <li>
                  Deferred capabilities such as live role agents, scoring, saved
                  runs, dynamic branching, and Agentforce responses belong to
                  later milestones.
                </li>
                <li>
                  Scenario 001 stays focused on Case escalation, manager
                  visibility, validation evidence, access checks, and release
                  readiness tradeoffs.
                </li>
              </ul>
            </section>
          </div>
        </template>
      </section>
    </div>
  </lightning-card>
</template>
