<template>
  <lightning-card title="Scenario 001 Risk Review" icon-name="standard:case">
    <div class="slds-p-horizontal_medium slds-p-bottom_medium">
      <template if:true={isLoading}>
        <div class="record-state record-state_loading">
          <lightning-spinner
            alternative-text="Loading Scenario 001 risk review"
            size="small"
          ></lightning-spinner>
          <p class="record-state-text slds-m-top_medium">
            Loading Scenario 001 risk review...
          </p>
        </div>
      </template>

      <template if:true={hasRecordData}>
        <dl class="slds-list_horizontal slds-wrap slds-text-body_regular">
          <dt
            class="slds-item_label slds-text-color_weak slds-truncate"
            title="Scenario State"
          >
            Scenario State
          </dt>
          <dd class="slds-item_detail slds-truncate">{scenarioState}</dd>

          <dt
            class="slds-item_label slds-text-color_weak slds-truncate"
            title="High Risk"
          >
            High Risk
          </dt>
          <dd class="slds-item_detail slds-truncate">{highRiskStatus}</dd>

          <dt
            class="slds-item_label slds-text-color_weak slds-truncate"
            title="High Risk Override"
          >
            High Risk Override
          </dt>
          <dd class="slds-item_detail slds-truncate">
            {highRiskOverrideStatus}
          </dd>

          <dt
            class="slds-item_label slds-text-color_weak slds-truncate"
            title="High Risk Reason"
          >
            High Risk Reason
          </dt>
          <dd class="slds-item_detail slds-truncate">{highRiskReason}</dd>

          <dt
            class="slds-item_label slds-text-color_weak slds-truncate"
            title="Customer Tier"
          >
            Customer Tier
          </dt>
          <dd class="slds-item_detail slds-truncate">{customerTier}</dd>

          <dt
            class="slds-item_label slds-text-color_weak slds-truncate"
            title="Priority"
          >
            Priority
          </dt>
          <dd class="slds-item_detail slds-truncate">{priority}</dd>

          <dt
            class="slds-item_label slds-text-color_weak slds-truncate"
            title="Status"
          >
            Status
          </dt>
          <dd class="slds-item_detail slds-truncate">{status}</dd>
        </dl>

        <section
          class="demo-readiness slds-m-top_medium"
          aria-labelledby="demo-readiness-heading"
        >
          <h3
            id="demo-readiness-heading"
            class="demo-readiness-heading slds-text-heading_small"
          >
            Scenario Mode
          </h3>
          <div class="demo-mode-list">
            <template for:each={scenarioMode} for:item="item">
              <span key={item.label} class="demo-mode-pill">
                <span class="demo-mode-label">{item.label}</span>
                <span class="demo-mode-value">{item.value}</span>
              </span>
            </template>
          </div>

          <div class="demo-readiness-grid">
            <section
              class="demo-readiness-note"
              aria-labelledby="demonstrates-heading"
            >
              <h4 id="demonstrates-heading" class="demo-note-heading">
                What This Demonstrates
              </h4>
              <ul class="demo-note-list">
                <template
                  for:each={demonstratedCapabilities}
                  for:item="capability"
                >
                  <li key={capability}>{capability}</li>
                </template>
              </ul>
            </section>

            <section
              class="demo-readiness-note"
              aria-labelledby="future-capabilities-heading"
            >
              <h4 id="future-capabilities-heading" class="demo-note-heading">
                Not Yet Implemented
              </h4>
              <ul class="demo-note-list">
                <template for:each={futureCapabilities} for:item="capability">
                  <li key={capability}>{capability}</li>
                </template>
              </ul>
            </section>
          </div>
        </section>

        <section
          class="scenario-summary slds-m-top_medium"
          aria-labelledby="scenario-summary-heading"
        >
          <h3
            id="scenario-summary-heading"
            class="scenario-summary-heading slds-text-heading_small"
          >
            Scenario Summary
          </h3>
          <dl class="scenario-summary-grid">
            <div class="scenario-summary-item">
              <dt>Scenario Interpretation</dt>
              <dd>{scenarioSummary.interpretation}</dd>
            </div>
            <div class="scenario-summary-item">
              <dt>Primary Risk Theme</dt>
              <dd>{scenarioSummary.riskTheme}</dd>
            </div>
            <div class="scenario-summary-item">
              <dt>Recommended Review Lens</dt>
              <dd>{scenarioSummary.reviewLens}</dd>
            </div>
          </dl>
        </section>

        <section
          class="scenario-signals slds-m-top_medium"
          aria-label="Scenario Signals"
        >
          <p class="signals-heading">Scenario Signals</p>
          <div class="signals-list">
            <span class="signal-pill">
              <span class="signal-label">State</span>
              <span class="signal-value">{scenarioState}</span>
            </span>
            <span class="signal-pill">
              <span class="signal-label">Tier</span>
              <span class="signal-value">{customerTier}</span>
            </span>
            <span class="signal-pill">
              <span class="signal-label">Priority</span>
              <span class="signal-value">{priority}</span>
            </span>
            <span class="signal-pill">
              <span class="signal-label">Flow</span>
              <span class="signal-value">{flowSignal}</span>
            </span>
          </div>
        </section>

        <section
          class="escalation-metrics slds-m-top_medium"
          aria-labelledby="escalation-metrics-heading"
        >
          <h3
            id="escalation-metrics-heading"
            class="metrics-heading slds-text-heading_small"
          >
            Escalation Metrics
          </h3>
          <div class="metrics-grid">
            <div class="metric-item">
              <p class="metric-label">Active Escalation Signal</p>
              <p class="metric-value">{escalationMetrics.activeSignal}</p>
            </div>
            <div class="metric-item">
              <p class="metric-label">Escalation Source</p>
              <p class="metric-value">{escalationMetrics.source}</p>
            </div>
            <div class="metric-item">
              <p class="metric-label">Queue Aging Watch</p>
              <p class="metric-value">{escalationMetrics.queueAgingWatch}</p>
            </div>
            <div class="metric-item">
              <p class="metric-label">Operational Attention Level</p>
              <p class="metric-value">{escalationMetrics.attentionLevel}</p>
            </div>
          </div>
        </section>

        <section
          class="delivery-channel slds-m-top_medium"
          aria-labelledby="delivery-team-channel-heading"
        >
          <h3
            id="delivery-team-channel-heading"
            class="channel-heading slds-text-heading_small"
          >
            Delivery Team Channel
          </h3>

          <div class="thread-list">
            <template for:each={groupedGuidanceMessages} for:item="group">
              <section key={group.group} class="thread-group">
                <p class="thread-group-label">{group.group}</p>
                <template for:each={group.messages} for:item="message">
                  <article
                    key={message.key}
                    class="thread-message slds-theme_default"
                  >
                    <div
                      class="slds-grid slds-wrap slds-grid_align-spread slds-gutters_x-small"
                    >
                      <div>
                        <p class="message-role">{message.role}</p>
                        <p class="message-focus">{message.focus}</p>
                      </div>
                      <span class="message-label slds-badge">
                        {message.label}
                      </span>
                    </div>
                    <p class="message-text">{message.text}</p>
                  </article>
                </template>
              </section>
            </template>
          </div>
        </section>

        <div class="simulation-stack slds-m-top_large">
          <section
            class="scenario-progression simulation-section progression-panel"
            aria-labelledby="scenario-progression-heading"
          >
            <div class="progression-heading-row">
              <h3
                id="scenario-progression-heading"
                class="scenario-progression-heading simulation-section-heading slds-text-heading_small"
              >
                Scenario Progression
              </h3>
              <span class="progression-status-pill">
                {scenarioProgression.status}
              </span>
            </div>
            <dl class="progression-detail-grid">
              <div class="progression-detail-item">
                <dt>Current Scenario Phase</dt>
                <dd>{scenarioProgression.phase}</dd>
              </div>
              <div class="progression-detail-item">
                <dt>Current Delivery Concern</dt>
                <dd>{scenarioProgression.concern}</dd>
              </div>
              <div class="progression-detail-item">
                <dt>Recommended Next Investigation</dt>
                <dd>{scenarioProgression.nextInvestigation}</dd>
              </div>
              <div class="progression-detail-item">
                <dt>Potential Future Expansion Path</dt>
                <dd>{scenarioProgression.futureExpansionPath}</dd>
              </div>
            </dl>
          </section>

          <section
            class="stakeholder-pressure simulation-section progression-panel"
            aria-labelledby="stakeholder-pressure-heading"
          >
            <h3
              id="stakeholder-pressure-heading"
              class="stakeholder-pressure-heading simulation-section-heading slds-text-heading_small"
            >
              Stakeholder Change Pressure
            </h3>
            <dl class="progression-detail-grid">
              <div class="progression-detail-item">
                <dt>Stakeholder Ask</dt>
                <dd>{stakeholderChangePressure.ask}</dd>
              </div>
              <div class="progression-detail-item">
                <dt>Delivery Tension</dt>
                <dd>{stakeholderChangePressure.tension}</dd>
              </div>
              <div class="progression-detail-item">
                <dt>Review Lens</dt>
                <dd>{stakeholderChangePressure.reviewLens}</dd>
              </div>
            </dl>
          </section>

          <section
            class="learner-branch-preview simulation-section progression-panel"
            aria-labelledby="learner-branch-preview-heading"
          >
            <h3
              id="learner-branch-preview-heading"
              class="learner-branch-preview-heading simulation-section-heading slds-text-heading_small"
            >
              Learner Branch Preview
            </h3>
            <p class="branch-preview-note">
              Simulated future learner paths only. These are not clickable
              decisions yet.
            </p>
            <div class="branch-preview-list">
              <template for:each={learnerBranchPreviews} for:item="branch">
                <article key={branch.label} class="branch-preview-item">
                  <p class="branch-preview-title">{branch.label}</p>
                  <dl class="branch-preview-details">
                    <dt>Why choose it</dt>
                    <dd>{branch.reason}</dd>
                    <dt>Tradeoff or risk</dt>
                    <dd>{branch.tradeoff}</dd>
                  </dl>
                </article>
              </template>
            </div>
          </section>

          <section
            class="consequence-preview simulation-section progression-panel"
            aria-labelledby="consequence-preview-heading"
          >
            <h3
              id="consequence-preview-heading"
              class="consequence-preview-heading simulation-section-heading slds-text-heading_small"
            >
              Consequence Preview
            </h3>
            <p class="branch-preview-note">
              Simulated downstream consequences only. These are not live
              analytics or persisted scenario outcomes.
            </p>
            <div class="branch-preview-list">
              <template for:each={consequencePreviews} for:item="consequence">
                <article key={consequence.label} class="branch-preview-item">
                  <p class="branch-preview-title">{consequence.label}</p>
                  <dl class="branch-preview-details">
                    <dt>Affected role or area</dt>
                    <dd>{consequence.area}</dd>
                    <dt>Why it matters</dt>
                    <dd>{consequence.why}</dd>
                  </dl>
                </article>
              </template>
            </div>
          </section>

          <section
            class="outcome-risk simulation-section progression-panel"
            aria-labelledby="outcome-risk-heading"
          >
            <h3
              id="outcome-risk-heading"
              class="outcome-risk-heading simulation-section-heading slds-text-heading_small"
            >
              Outcome and Risk
            </h3>
            <div class="outcome-risk-grid">
              <div class="outcome-risk-item">
                <p class="outcome-risk-label">Current Outcome</p>
                <p class="outcome-risk-text">{outcomeAndRisk.outcome}</p>
              </div>
              <div class="outcome-risk-item">
                <p class="outcome-risk-label">Risk if Shipped As-Is</p>
                <p class="outcome-risk-text">{outcomeAndRisk.risk}</p>
              </div>
            </div>
          </section>

          <section
            class="decision-paths simulation-section progression-panel"
            aria-labelledby="decision-paths-heading"
          >
            <h3
              id="decision-paths-heading"
              class="decision-paths-heading simulation-section-heading slds-text-heading_small"
            >
              Simulation Decision Paths
            </h3>
            <div class="decision-path-list">
              <template for:each={decisionPaths} for:item="path">
                <article key={path.recommendation} class="decision-path-item">
                  <p class="decision-path-title">{path.recommendation}</p>
                  <dl class="decision-path-details">
                    <dt>Expected Benefit</dt>
                    <dd>{path.benefit}</dd>
                    <dt>Possible Tradeoff/Risk</dt>
                    <dd>{path.tradeoff}</dd>
                  </dl>
                </article>
              </template>
            </div>
          </section>

          <section
            class="learning-checkpoint simulation-section progression-panel"
            aria-labelledby="learning-checkpoint-heading"
          >
            <h3
              id="learning-checkpoint-heading"
              class="learning-checkpoint-heading simulation-section-heading slds-text-heading_small"
            >
              Learning Checkpoint
            </h3>
            <ol class="learning-checkpoint-list">
              <template for:each={learningCheckpoints} for:item="prompt">
                <li key={prompt} class="learning-checkpoint-item">{prompt}</li>
              </template>
            </ol>
          </section>

          <section
            class="learner-progression simulation-section progression-panel"
            aria-labelledby="learner-progression-heading"
          >
            <h3
              id="learner-progression-heading"
              class="learner-progression-heading simulation-section-heading slds-text-heading_small"
            >
              Learner Progression
            </h3>
            <dl class="learner-progression-grid">
              <div class="learner-progression-item">
                <dt>Current Skill Focus</dt>
                <dd>{learnerProgression.currentSkillFocus}</dd>
              </div>
              <div class="learner-progression-item">
                <dt>Suggested Next Skill</dt>
                <dd>{learnerProgression.suggestedNextSkill}</dd>
              </div>
              <div class="learner-progression-item">
                <dt>Scenario Complexity Level</dt>
                <dd>{learnerProgression.complexityLevel}</dd>
              </div>
            </dl>
          </section>
        </div>
      </template>

      <template if:true={hasRecordError}>
        <div class="record-state record-state_error" role="alert">
          <p class="record-state-title slds-text-color_error">
            Scenario 001 risk review could not be loaded.
          </p>
          <p class="record-state-text">
            Refresh the record page or confirm this user has access to the Case
            and Scenario 001 fields.
          </p>
        </div>
      </template>
    </div>
  </lightning-card>
</template>
